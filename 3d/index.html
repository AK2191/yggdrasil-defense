<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b1622">
<title>Yggdrasil Defense 3D (Beta)</title>
<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<style>
  :root{
    --panel:rgba(14,26,38,.94); --line:rgba(120,180,220,.16); --acc:#4ade80; --gold:#fbbf24;
    --red:#ff5a52; --blue:#5aa9ff; --ink:#eaf2f7; --muted:rgba(215,230,240,.6);
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:none}
  html,body{margin:0;height:100%;overflow:hidden;background:#070d14;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif}
  #gl{position:fixed;inset:0;display:block}
  .hidden{display:none !important}
  #topbar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;gap:8px;
    padding:calc(8px + var(--safe-t)) 10px 8px;justify-content:center;pointer-events:none}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:7px 12px;
    display:flex;flex-direction:column;align-items:center;min-width:64px;box-shadow:0 6px 20px rgba(0,0,0,.35)}
  .stat .val{font-weight:800;font-size:15px;font-variant-numeric:tabular-nums}
  .stat small{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .stat.gold .val{color:var(--gold)} .stat.life .val{color:var(--red)} .stat.wave .val{color:var(--blue)}
  #bottombar{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:8px 8px calc(8px + var(--safe-b));
    background:linear-gradient(180deg,transparent,rgba(6,12,18,.55) 22%)}
  #towerRow{display:flex;gap:7px;justify-content:center;overflow-x:auto;scrollbar-width:none}
  #towerRow::-webkit-scrollbar{display:none}
  .twr{flex:0 0 auto;width:72px;background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:9px 6px;text-align:center;transition:transform .08s,border-color .12s}
  .twr:active{transform:scale(.95)}
  .twr.sel{border-color:var(--acc);background:linear-gradient(180deg,rgba(74,222,128,.18),rgba(74,222,128,.05))}
  .twr.locked{opacity:.4}
  .twr .dot{width:16px;height:16px;border-radius:50%;margin:0 auto 5px;box-shadow:0 0 10px currentColor}
  .twr .nm{font-size:10px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .twr .cost{font-size:11px;font-weight:800;color:var(--gold);margin-top:2px}
  .twr .cost.na{color:var(--red)}
  #actionRow{display:flex;gap:8px;justify-content:center;margin-top:8px}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:999px;
    padding:11px 18px;font-weight:800;font-size:14px;box-shadow:0 6px 18px rgba(0,0,0,.3)}
  .btn:active{transform:scale(.96)}
  .btn.primary{background:linear-gradient(180deg,#2f9e5a,#1f7a45);border-color:#4ade80;color:#eafff0}
  .btn:disabled{opacity:.45}
  #banner{position:fixed;top:calc(64px + var(--safe-t));left:50%;transform:translateX(-50%);z-index:30;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:9px 16px;font-weight:800;
    font-size:13px;opacity:0;transition:.22s;pointer-events:none;white-space:nowrap}
  #banner.show{opacity:1}
  #sheet{position:fixed;left:8px;right:8px;bottom:calc(140px + var(--safe-b));z-index:25;background:var(--panel);
    border:1px solid var(--line);border-radius:18px;padding:12px;max-width:420px;margin:0 auto;display:none;
    box-shadow:0 12px 40px rgba(0,0,0,.5)}
  #sheet.show{display:block}
  #sheet .row{display:flex;gap:8px;margin-top:10px}
  #sheet .row .btn{flex:1;text-align:center;padding:11px}
  #sheet .ttl{font-weight:900;font-size:15px}
  #sheet .sub{color:var(--muted);font-size:12px;font-weight:700;margin-top:2px}
  .overlay{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;background:radial-gradient(120% 90% at 50% 0%,rgba(20,40,58,.92),rgba(5,10,16,.97))}
  .overlay h1{font-size:30px;font-weight:900;margin:0 0 6px;
    background:linear-gradient(90deg,#7de6ab,#4ade80,#5aa9ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .overlay .sub{color:var(--muted);font-size:14px;max-width:420px;line-height:1.5;margin:0 0 20px}
  .big{font-size:15px;padding:15px 34px}
  #fps{position:fixed;top:calc(4px + var(--safe-t));left:6px;z-index:15;font-size:10px;color:rgba(150,200,230,.45);pointer-events:none}
  a.back{color:var(--muted);font-size:12px;margin-top:16px;display:inline-block}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="fps"></div>

<div id="topbar">
  <div class="stat gold"><div class="val" id="uiGold">0</div><small>Gold</small></div>
  <div class="stat life"><div class="val" id="uiLife">0</div><small>Langhaus</small></div>
  <div class="stat wave"><div class="val" id="uiWave">0</div><small>Welle</small></div>
  <div class="stat"><div class="val" id="uiScore">0</div><small>Punkte</small></div>
</div>

<div id="banner"></div>

<div id="sheet">
  <div class="ttl" id="shNm">Turm</div>
  <div class="sub" id="shInfo"></div>
  <div class="row">
    <button class="btn primary" id="shUpBtn">Upgrade</button>
    <button class="btn" id="shSellBtn">Verkaufen</button>
    <button class="btn" id="shCloseBtn">✕</button>
  </div>
</div>

<div id="bottombar">
  <div id="towerRow"></div>
  <div id="actionRow">
    <button class="btn" id="pauseBtn">⏸︎</button>
    <button class="btn primary" id="waveBtn">▶︎ Welle 1</button>
    <button class="btn" id="speedBtn">1×</button>
  </div>
</div>

<div class="overlay" id="startScreen">
  <h1>Yggdrasil Defense 3D</h1>
  <p class="sub">Echtes WebGL-3D (Beta): perspektivische Kamera, Licht &amp; Schatten, Low-Poly-Modelle.
  Ziehen = Karte bewegen · Pinch = Zoom · Tippen = Turm bauen.</p>
  <button class="btn primary big" id="playBtn">▶︎ Spielen</button>
  <a class="back" href="../index.html">← zurück zur 2D-Version</a>
</div>

<div class="overlay hidden" id="endScreen">
  <h1 id="endTitle">Ragnarök</h1>
  <p class="sub" id="endSub"></p>
  <button class="btn primary big" id="againBtn">↻ Neuer Versuch</button>
  <a class="back" href="../index.html">← zurück zur 2D-Version</a>
</div>

<script src="three.min.js"></script>
<script src="game3d.js"></script>
</body>
</html>
